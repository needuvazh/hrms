spring:
  application:
    name: hrms-app-monolith
  r2dbc:
    url: ${HRMS_R2DBC_URL:r2dbc:postgresql://localhost:5433/hrms}
    username: ${HRMS_DB_USERNAME:hrms}
    password: ${HRMS_DB_PASSWORD:hrms}
  flyway:
    enabled: true
    url: ${HRMS_JDBC_URL:jdbc:postgresql://localhost:5433/hrms}
    user: ${HRMS_DB_USERNAME:hrms}
    password: ${HRMS_DB_PASSWORD:hrms}
    locations:
      - classpath:db/migration/tenant
      - classpath:db/migration/auth
      - classpath:db/migration/master-data
      - classpath:db/migration/person
      - classpath:db/migration/employee
      - classpath:db/migration/recruitment
      - classpath:db/migration/attendance
      - classpath:db/migration/workflow
      - classpath:db/migration/leave
      - classpath:db/migration/payroll
      - classpath:db/migration/wps
      - classpath:db/migration/pasi
      - classpath:db/migration/notification
      - classpath:db/migration/outbox
      - classpath:db/migration/audit
      - classpath:db/migration/document
      - classpath:db/migration/integration-hub
      - classpath:db/migration/organization
      - classpath:db/migration/job-architecture

hrms:
  web:
    cors:
      enabled: ${HRMS_WEB_CORS_ENABLED:true}
      allowed-origin-patterns: ${HRMS_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
      allowed-methods: ${HRMS_WEB_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${HRMS_WEB_CORS_ALLOWED_HEADERS:Content-Type,Authorization,X-Tenant-Id,X-Tenant-Key}
      exposed-headers: ${HRMS_WEB_CORS_EXPOSED_HEADERS:Authorization,X-Correlation-Id,X-Trace-Id,X-Span-Id}
      allow-credentials: ${HRMS_WEB_CORS_ALLOW_CREDENTIALS:true}
  security:
    jwt:
      issuer: ${HRMS_JWT_ISSUER:hrms-monolith}
      secret: ${HRMS_JWT_SECRET:change-this-very-secret-key-123456789}
      expiry-seconds: ${HRMS_JWT_EXPIRY_SECONDS:3600}

management:
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    env:
      enabled: false
    configprops:
      enabled: false
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  tracing:
    enabled: true
    sampling:
      probability: ${HRMS_TRACING_SAMPLING_PROBABILITY:0.10}

logging:
  level:
    root: INFO
    com.company.hrms: INFO
